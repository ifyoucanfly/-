seed: 42
device: cuda
data:
  name: visium_hd_crc
  annotation_csv: runs/preprocessed/visium_hd_crc_8um_GSM8594569_P5CRC_hvg1024.csv.gz
  gold_grn_path: null
  num_genes: 512
  num_timepoints: 4
  max_cells: 4000
  batch_size: 1
  k_nn: 8
  delta_t: 1.0
  noise_std: 0.01
  grid_um: 20.0
  bin_to_grid: true
  smooth_sigma: 1.2
  smooth_radius: 3
  zI_dim: 4
  zN_dim: 4
  env_map: null
  roi_mode: center
  roi_center_frac: 0.8
  roi_seed: 42
  roi_collect_multiplier: 2
  max_gene_pool: 3000
  max_grid_cells: 1000000
  smooth_knn_k: 32
  pseudotime_mode: zE0
  gold_force_keep: 0
  hvg_flavors: []
  gold_min_pos_edges: 20
  gold_max_force_keep: 896
  restrict_gene_pool_to_gold_ratio: 0.0
  dynamic_anchor_pairing: false
  annotation_map:
    Tumor: 1
    Stroma: 0
    Unknown: -1
  barrier_force_keep_genes:
  - TGFB1
  - TGFBR1
  - TGFBR2
  - CXCL12
  - CXCR4
  - CXCR7
  - ACKR3
  - COL1A1
  - COL1A2
  - COL3A1
  - FAP
  - PDGFRB
  - ACTA2
  - TAGLN
  - POSTN
  - FN1
  - VCAN
  - PTPRC
  - CD3D
  - CD3E
  - TRBC1
  - TRBC2
  - NKG7
  - CCL5
  - CXCL9
  - CXCL10
  - CXCL11
model:
  latent_dim: 64
  hidden_dim: 128
  num_layers: 2
  gate_hidden: 64
  gate_l1: 2.0e-05
  gate_tv: 0.00012
  enable_mms: true
  enable_ot: false
  enable_mechanomics: true
  upwind_drift: true
  irm_lambda: 0.02
  irm_split: bio_gt_auto
  irm_warmup_epochs: 80
  irm_balance: true
  recon_loss: huber
  huber_delta: 1.0
  balance_recon: true
  mms_target_frac_stage1: 0.24
  mms_target_frac_stage2: 0.14
  mms_lr_mult: 3.5
solver:
  method: rk4
  use_adjoint: false
  rtol: 0.001
  atol: 0.001
  max_steps: 100
  adjoint_rtol: 0.001
  adjoint_atol: 0.001
  step_size: 0.06
  num_time_points: 18
  time_grid: power
ot:
  enabled: false
ood:
  z_score_threshold: 3.0
  fallback_disable_mod: true
  fallback_disable_drift: true
train:
  epochs: 220
  stage0_epochs: 50
  stage1_epochs: 100
  stage2_epochs: 40
  lr: 0.0003
  weight_decay: 1.0e-06
  grad_clip: 1.0
  log_every: 10
  save_dir: runs/real_crc_main_claim_st_only
  mms_lr_mult: 4.0
  stage1_gate_l1_scale: 0.08
  stage1_gate_tv_scale: 0.05
  stage2_gate_l1_scale: 0.18
  stage2_gate_tv_scale: 0.1
  stage1_gate_open_target: 0.025
  stage1_gate_open_weight: 0.3
  stage2_gate_open_target: 0.02
  stage2_gate_open_weight: 0.12
  stage1_gate_interface_margin: 0.04
  stage1_gate_interface_weight: 1.2
  stage2_gate_interface_margin: 0.05
  stage2_gate_interface_weight: 2.0
  stage2_cf_roi_weight: 0.01
  stage2_cf_roi_margin: 0.0005
  stage2_cf_drop_scales:
  - 0.06
  - 0.12
  - 0.06
  stage2_lr_scale: 0.4
  checkpoint_every: 5
  early_stop_patience: 30
  early_stop_min_delta: 0.0001
  early_stop_start_epoch: 180
  checkpoint_main_claim_start_epoch: 60
  checkpoint_gate_activity_ceiling: 0.82
  checkpoint_gate_bg_ceiling: 0.34
  checkpoint_gate_gap_target: 0.16
  checkpoint_gate_roi_weight: 0.8
  checkpoint_gate_gap_weight: 9.0
  checkpoint_gate_non_interface_weight: 3.2
  checkpoint_gate_overopen_weight: 7.5
  checkpoint_cf_delta_weight: 6.5
  checkpoint_cf_bg_ratio_weight: 2.6
  checkpoint_cf_gap_ratio_weight: 1.8
  gate_l1: 1.5e-05
  gate_tv: 0.0001
  stage1_base_lr_scale: 1.0
  stage2_base_lr_scale: 0.6
  stage1_mms_lr_scale: 1.0
  stage2_mms_lr_scale: 1.3
  stage1_gate_local_weight: 0.6
  stage2_gate_local_weight: 1.0
  stage1_gate_bg_allowance: 0.003
  stage2_gate_bg_allowance: 0.0015
  mms_target_frac_stage1: 0.24
  mms_target_frac_stage2: 0.14
  patch_version: 20260314_v23_focus_barrier_cf
  stage1_roi_fraction_start: 0.12
  stage1_roi_fraction_end: 0.17
  stage2_roi_fraction_start: 0.17
  stage2_roi_fraction_end: 0.18
  gate_residual_threshold_quantile: 0.76
  gate_residual_threshold_min: 0.18
  gate_residual_threshold_max: 0.92
  gate_lambda_high_residual: 0.45
  gate_lambda_low_residual: 2.3
  cf_gradient_modulation: 1.85
  cf_contrastive_weight: 0.32
  cf_target_delta: 0.065
  cf_negative_delta_weight: 3.6
  cf_mid_delta_weight: 1.9
  cf_roi_shift_floor: 0.18
  cf_bg_ratio_cap: 0.5
  cf_gap_preserve_ratio: 0.72
  cf_intervention_scale: 1.75
  envelope_lower_diffusion_scales:
  - 0.15
  - 0.25
  - 0.5
  ood_nan_rollback: true
viz:
  out_dir: runs/real_crc_main_claim_st_only/figures
grn_export:
  enabled: true
  method: cycle_jacobian
  top_k: 2000
  abs_score: true
  ig_steps: 32
  cycle_max_cells: 512
  n_subsamples: 16
  cells_per_snapshot: 512
  subsample_agg: median
  dedup_reciprocal: true
  score_norm: rowcol
eval:
  intervention:
    roi_drop_scales:
    - 0.12
    - 0.2
    - 0.12
  task_primary:
  - delta_p_cross
  - gate_interface_enrichment
  - gate_sparsity
  - ood_flag_do_z
  task_secondary:
  - edge_aupr_optional
  objective_note: Main-claim config for ST-only CRC interface story. Gold-edge recovery
    is disabled by default because the current uploaded package does not include a
    trustworthy idmapping rebuild path; primary outputs are vector-field / counterfactual
    rollout / Gate localization / infiltration outcome / OOD envelope.
  ot_policy: Keep OT off for routine engineering runs unless the environment is confirmed
    to have POT, torch_geometric and torch_cluster installed. Re-enable OT for paper-grade
    temporal/serial experiments where misalignment robustness is explicitly evaluated.
  claim_profiles:
    main_mechanism:
      enable_ot_pairing: false
      enable_dynamic_anchor_pairing: false
    ot_pairing_validation:
      enable_ot_pairing: true
      enable_dynamic_anchor_pairing: false
    dynamic_anchor_validation:
      enable_ot_pairing: false
      enable_dynamic_anchor_pairing: true
  misalignment_deltas_um:
  - 5
  - 10
  - 50
  export_rollout_snapshots: true
  export_gif: true
component_switches:
  enable_ot_pairing: false
  enable_dynamic_anchor_pairing: false
  claim_profile: main_mechanism
claim_runtime:
  claim_profile: main_mechanism
  enable_ot_pairing: false
  enable_dynamic_anchor_pairing: false
  user_override_ot_pairing: null
  user_override_dynamic_anchor_pairing: null
patch_version: 20260314_v23_focus_barrier_cf
