device: cpu
seed: 0
data:
  name: visium_hd_10x
  h5_path: data/CRC_filtered_feature_bc_matrix.h5
  tissue_positions_parquet: data/CRC_tissue_positions.parquet
  annotations_csv: data/CRC_annotations.csv
  barcode_col: barcode
  x_col: x
  y_col: y
  annotation_col: annotation
  strip_dash_suffix: true
  gold_grn_path: null
  k_nn: 12
  grid_um: 20.0
  smooth_sigma: 1.5
  smooth_radius: 3
  zI_dim: 4
  zN_dim: 4
  delta_t: 1.0
model:
  latent_dim: 64
  hidden_dim: 128
  num_layers: 2
  enable_mms: true
  enable_mechanomics: true
  upwind_drift: true
  enable_ot: true
  gate_l1: 0.001
  gate_tv: 0.001
solver:
  method: dopri5
  rtol: 0.0001
  atol: 1.0e-05
  max_nfe: 4000
ot:
  reg_eps: 0.05
  max_iter: 60
  update_freq: 5
  knn_k: 80
  alpha: 0.5
  epsilon: 0.05
  sinkhorn_iter: 60
ood:
  zscore_thresh: 3.0
  fallback_mode: diffusion_only
train:
  epochs: 20
  lr: 0.001
  batch_size: 1
  stage0_epochs: 5
  stage1_epochs: 10
  stage2_epochs: 5
  log_every: 1
  save_dir: runs/visium_hd_10x_crc
grn_export:
  enabled: true
  method: cycle_jacobian
  top_k: 2000
  abs_score: true
  ig_steps: 32
  cycle_max_cells: 32
